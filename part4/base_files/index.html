<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List of Places</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="hbnb_logo" class="logo">
        <nav>
            <a href="login.html" id="login-link" class="login-button">Login</a>
        </nav>
    </header>
    <main>
        <section id="filter">
            <h2>Available Places</h2>
            <div class="filter-container">
                <label for="price-filter">Max Price:</label>
                <select id="price-filter">
                    <!-- Options will be populated dynamically -->
                </select>
            </div>
        </section>
        <section id="places-list">
            <div class="place-card">
                <p>Place 1</p>
                <p>Price per night: $100</p>
                <button>View Details</button>
            </div>
            <div class="place-card">
                <p>Place 2</p>
                <p>Price per night: $150</p>
                <button>View Details</button>
            </div>
            <div class="place-card">
                <p>Place 3</p>
                <p>Price per night: $200</p>
                <button>View Details</button>
            </div>
            <!-- List of places will be populated dynamically -->
        </section>
    </main>
    <script src="scripts.js"></script>
    <footer>
        <p>&copy; 2026 HBnB Evolution. All rights reserved</p>
    </footer>
</body>
</html>
